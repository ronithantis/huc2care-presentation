<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hub2care — מצגת למשקיעים</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { display: none; }
html, body { height: 100vh; overflow: hidden; }
body { font-family: 'Assistant', 'Heebo', sans-serif; color: #1e293b; background: #f8fafc; font-size: 15px; line-height: 1.6; }

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; width: 100%; direction: rtl; overflow: hidden; }

/* ===== SIDEBAR ===== */
.sidebar { width: 260px; background: linear-gradient(180deg, #0d4452 0%, #125c6d 100%); color: white; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: -4px 0 24px rgba(0,0,0,0.08); z-index: 10; }
.sidebar-logo { padding: 28px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; }
.logo-img { width: 90px; height: 84px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35)); margin-bottom: 12px; }
.sidebar-title { font-family: 'Heebo', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: -0.8px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
.sidebar-sub { font-size: 10px; color: #5eead4; text-transform: uppercase; letter-spacing: 3.5px; margin-top: 6px; font-weight: 400; opacity: 0.75; }

.nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-btn { width: 100%; display: flex; align-items: center; gap: 14px; padding: 13px 22px; text-align: right; background: none; border: none; color: #b8e0e6; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; border-right: 4px solid transparent; transition: all 0.2s; }
.nav-btn:hover { background: rgba(255,255,255,0.06); color: white; }
.nav-btn.active { background: rgba(255,255,255,0.1); border-right-color: #d4af37; color: white; font-weight: 700; }
.nav-btn.active .nav-icon { color: #d4af37; }
.nav-icon { flex-shrink: 0; opacity: 0.75; display: inline-flex; transition: all 0.2s; }
.nav-btn:hover .nav-icon { opacity: 1; }

.sidebar-foot { padding: 16px; text-align: center; font-size: 10px; color: rgba(255,255,255,0.35); border-top: 1px solid rgba(255,255,255,0.08); letter-spacing: 2px; font-weight: 300; }

/* ===== MAIN ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }
.slide-area { flex: 1; padding: 44px 48px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* Slide counter */
.slide-counter { position: absolute; top: 20px; left: 48px; font-size: 12px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }
.slide-counter span { color: #125c6d; font-weight: 800; }

/* Controls */
.controls { padding: 16px 32px; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: white; }
.ctrl-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #f1f5f9; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.ctrl-btn:hover:not(:disabled) { background: #125c6d; color: white; transform: scale(1.05); }
.ctrl-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.dots { display: flex; gap: 7px; align-items: center; }
.dot { height: 7px; width: 7px; border-radius: 99px; background: #e2e8f0; transition: all 0.3s; cursor: pointer; }
.dot.active { width: 36px; background: #d4af37; }
.dot:hover:not(.active) { background: #94a3b8; }

/* ===== SLIDES ===== */
.slide { display: none; flex-direction: column; height: 100%; animation: slideIn 0.45s cubic-bezier(0.2, 0.9, 0.3, 1); }
.slide.active { display: flex; }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.slide-heading { font-family: 'Heebo', sans-serif; font-size: 36px; font-weight: 900; color: #125c6d; margin-bottom: 28px; padding-right: 18px; border-right: 8px solid #1a8a9d; line-height: 1.15; flex-shrink: 0; letter-spacing: -0.5px; }
.slide-heading.gold { border-right-color: #d4af37; }
.slide-heading.dark { border-right-color: #125c6d; }
.slide-heading.purple { border-right-color: #7c3aed; }

/* ===== CARDS & ELEMENTS ===== */
.card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; transition: all 0.2s; }

.icon-circle { width: 48px; height: 48px; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Welcome */
.welcome-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 28px; }
.welcome-logo { width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 12px 30px rgba(18,92,109,0.25)); }
.welcome-brand { display: flex; flex-direction: column; align-items: center; gap: 18px; }
.welcome-brand-name { font-family: 'Heebo', sans-serif; font-size: 56px; font-weight: 900; color: #125c6d; letter-spacing: -2px; line-height: 1; }
.welcome-brand-name em { font-style: normal; color: #d4af37; }
.welcome-brand-tagline { font-size: 13px; color: #1a8a9d; text-transform: uppercase; letter-spacing: 5px; font-weight: 500; }
.welcome-title { font-family: 'Heebo', sans-serif; font-size: 44px; font-weight: 900; color: #125c6d; line-height: 1.2; letter-spacing: -0.8px; white-space: nowrap; }
.welcome-title-line2 { display: block; font-size: 34px; color: #1a8a9d; margin-top: 10px; font-weight: 800; white-space: normal; }
.welcome-title u { text-decoration-color: #d4af37; text-decoration-thickness: 5px; text-underline-offset: 12px; }
.welcome-sub { font-family: 'Heebo', sans-serif; font-size: 26px; font-weight: 600; color: #64748b; margin-top: 14px; letter-spacing: -0.3px; }
.welcome-badge { background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%); color: white; padding: 14px 48px; border-radius: 99px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; box-shadow: 0 12px 30px rgba(212,175,55,0.35); transition: transform 0.3s; font-family: 'Heebo', sans-serif; }
.welcome-badge:hover { transform: scale(1.05); }
.welcome-quote { max-width: 780px; font-size: 18px; color: #64748b; line-height: 1.85; font-weight: 400; font-style: italic; border-top: 1px solid #e2e8f0; padding-top: 26px; }

/* Stats */
.stat-card { border-radius: 16px; padding: 18px 14px; text-align: center; }
.stat-num { font-family: 'Heebo', sans-serif; font-size: 32px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.stat-label { font-size: 12px; font-weight: 700; margin-top: 6px; }

/* Solution */
.sol-card { border-radius: 22px; padding: 32px 26px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: all 0.3s; border-top: 4px solid; }
.sol-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.08); transform: translateY(-3px); }
.sol-card .icon-circle { margin-bottom: 16px; width: 60px; height: 60px; }

/* Tool grid */
.tool-card { background: white; border: 1px solid #e2e8f0; border-top: 3px solid rgba(26,138,157,0.25); border-radius: 14px; padding: 18px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: all 0.2s; cursor: default; gap: 10px; }
.tool-card:hover { border-top-color: #1a8a9d; box-shadow: 0 6px 18px rgba(26,138,157,0.14); transform: translateY(-3px); }
.tool-card .tool-icon { color: #1a8a9d; }

/* Business cards */
.biz-card { border-top: 4px solid; border-radius: 20px; padding: 22px 22px; display: flex; flex-direction: column; justify-content: space-between; transition: box-shadow 0.25s; min-height: 0; }
.biz-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.biz-card.featured { transform: scale(1.04); box-shadow: 0 8px 28px rgba(26,138,157,0.2); }

/* Partner cards */
.partner-card { display: flex; align-items: center; gap: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 18px 20px; transition: all 0.2s; }
.partner-card:hover { background: #f8fafc; transform: translateX(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }

/* Competition table */
.comp-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.comp-table th { text-align: right; padding: 10px 12px; color: #64748b; font-weight: 600; border-bottom: 1px solid #e9d5ff; font-size: 12px; }
.comp-table th.center { text-align: center; }
.comp-table td { padding: 12px; border-bottom: 1px solid #f3e8ff; }
.comp-table td.center { text-align: center; font-size: 16px; font-weight: 700; }

/* Roadmap */
.roadmap-item { display: flex; gap: 14px; align-items: flex-start; }
.roadmap-quarter { color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; flex-shrink: 0; margin-top: 4px; white-space: nowrap; letter-spacing: 0.5px; }
.roadmap-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; flex: 1; }


/* ===== MODAL ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(13, 68, 82, 0.72); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; animation: fadeInOverlay 0.25s ease; padding: 24px; }
.modal-overlay.active { display: flex; }
@keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal { background: white; border-radius: 28px; max-width: 760px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 40px 80px rgba(0,0,0,0.35); overflow: hidden; animation: modalIn 0.35s cubic-bezier(0.2, 0.9, 0.3, 1); }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { background: linear-gradient(135deg, #0d4452 0%, #125c6d 100%); padding: 28px 32px; color: white; display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; flex-shrink: 0; position: relative; overflow: hidden; }
.modal-header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #d4af37 0%, #1a8a9d 100%); }
.modal-header-content { flex: 1; }
.modal-chapter-num { display: inline-block; background: rgba(212,175,55,0.2); color: #d4af37; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; padding: 5px 12px; border-radius: 99px; margin-bottom: 10px; }
.modal-title { font-family: 'Heebo', sans-serif; font-size: 30px; font-weight: 900; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px; }
.modal-subtitle { font-size: 14px; opacity: 0.85; line-height: 1.6; font-weight: 400; }
.modal-close { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.modal-close:hover { background: rgba(255,255,255,0.22); transform: rotate(90deg); }
.modal-body { padding: 24px 28px 32px; overflow-y: auto; flex: 1; }
.modal-section { display: flex; gap: 14px; padding: 16px 4px; border-bottom: 1px solid #f1f5f9; align-items: flex-start; transition: background 0.15s; border-radius: 8px; }
.modal-section:last-child { border-bottom: none; }
.modal-section:hover { background: #f8fafc; padding-left: 12px; padding-right: 12px; }
.modal-section-icon { width: 36px; height: 36px; border-radius: 10px; background: #f0f9ff; color: #1a8a9d; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-section-content { flex: 1; }
.modal-section-title { font-family: 'Heebo', sans-serif; font-weight: 800; font-size: 16px; color: #125c6d; margin-bottom: 3px; letter-spacing: -0.2px; }
.modal-section-desc { font-size: 13.5px; color: #64748b; line-height: 1.6; }
.chapter-clickable { cursor: pointer !important; position: relative; }
.chapter-clickable:hover { box-shadow: 0 6px 20px rgba(18,92,109,0.15); border-right-color: #d4af37 !important; }
.chapter-clickable::after { content: '‹'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #cbd5e1; transition: all 0.2s; font-weight: 700; }
.chapter-clickable:hover::after { color: #d4af37; transform: translateY(-50%) translateX(-4px); }


/* Tool modal variants */
.tool-card.tool-clickable { cursor: pointer; position: relative; }
.tool-card.tool-clickable:hover { border-top-color: #d4af37 !important; box-shadow: 0 8px 24px rgba(212,175,55,0.2); transform: translateY(-4px); }
.tool-card.tool-clickable::before { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: #d4af37; box-shadow: 0 0 0 3px rgba(212,175,55,0.2); }
.tool-card:not(.tool-clickable) { opacity: 0.78; }
.tool-card:not(.tool-clickable):hover { transform: none; box-shadow: none; border-top-color: rgba(26,138,157,0.25); }
.tool-info-banner { margin-bottom: 12px; font-size: 13px; color: #64748b; display: flex; align-items: center; gap: 10px; background: linear-gradient(90deg, rgba(212,175,55,0.08), transparent); padding: 10px 14px; border-radius: 10px; border-right: 3px solid #d4af37; }

/* Modal tool-specific */
.modal-description { background: #f8fafc; border-right: 3px solid #1a8a9d; padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; line-height: 1.75; color: #475569; }
.modal-section-heading { font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 800; color: #125c6d; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
.feature-item { display: flex; gap: 14px; padding: 12px 6px; border-bottom: 1px solid #f1f5f9; align-items: flex-start; transition: background 0.15s; border-radius: 8px; }
.feature-item:last-child { border-bottom: none; }
.feature-item:hover { background: #f8fafc; padding-left: 10px; padding-right: 10px; }
.feature-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.feature-content { flex: 1; }
.feature-title { font-family: 'Heebo', sans-serif; font-weight: 800; font-size: 15px; color: #125c6d; margin-bottom: 3px; }
.feature-desc { font-size: 13px; color: #64748b; line-height: 1.6; }
.modal-note { background: linear-gradient(135deg, #fef3c7 0%, #fefce8 100%); border: 1px solid #fcd34d; border-radius: 12px; padding: 14px 18px; margin-top: 18px; font-size: 13px; color: #78350f; line-height: 1.7; display: flex; gap: 10px; align-items: flex-start; }
.modal-note-icon { color: #d4af37; flex-shrink: 0; margin-top: 1px; }


/* Live site modal */
.site-modal-overlay { position: fixed; inset: 0; background: rgba(13, 68, 82, 0.85); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; animation: fadeInOverlay 0.25s ease; padding: 24px; }
.site-modal-overlay.active { display: flex; }
.site-modal { background: white; border-radius: 20px; width: 96vw; height: 92vh; max-width: 1600px; display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.5); overflow: hidden; animation: modalIn 0.35s cubic-bezier(0.2, 0.9, 0.3, 1); }
.site-modal-header { background: linear-gradient(135deg, #0d4452 0%, #125c6d 100%); padding: 14px 24px; color: white; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 16px; border-bottom: 3px solid #d4af37; }
.site-modal-title-wrap { display: flex; align-items: center; gap: 14px; flex: 1; }
.site-modal-badge { background: rgba(212,175,55,0.2); color: #d4af37; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 99px; display: flex; align-items: center; gap: 6px; }
.site-modal-badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s ease-in-out infinite; box-shadow: 0 0 0 2px rgba(16,185,129,0.3); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.site-modal-title { font-family: 'Heebo', sans-serif; font-size: 18px; font-weight: 800; line-height: 1.2; }
.site-modal-url { font-size: 12px; opacity: 0.7; font-family: monospace; direction: ltr; text-align: left; }
.site-modal-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.site-modal-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); color: white; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: inherit; text-decoration: none; }
.site-modal-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }
.site-modal-close { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.site-modal-close:hover { background: rgba(255,255,255,0.22); transform: rotate(90deg); }
.site-modal-body { flex: 1; background: #f8fafc; position: relative; overflow: hidden; }
.site-modal-iframe { width: 100%; height: 100%; border: none; background: white; display: block; }
.site-modal-loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; gap: 16px; z-index: 2; transition: opacity 0.4s; }
.site-modal-loader.hidden { opacity: 0; pointer-events: none; }
.site-loader-spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1a8a9d; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.site-loader-text { font-size: 14px; color: #64748b; font-weight: 500; }
.cta-link { cursor: pointer; display: inline-flex; align-items: center; gap: 10px; position: relative; }
.cta-link::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.25); animation: pulse 2s ease-in-out infinite; }

@media print {
  .controls, .sidebar { display: none !important; }
  .slide { display: flex !important; page-break-after: always; }
}
</style>
</head>

let current = 0;

function buildNav() {
  const nav = document.getElementById('nav');
  slides.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="nav-icon">${ic(s.icon, 18)}</span><span>${s.label}</span>`;
    btn.onclick = () => goTo(i);
    nav.appendChild(btn);
  });
}

function buildSlides() {
  const area = document.getElementById('slideArea');
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = 'slide-' + s.id;
    div.innerHTML = slideContent[s.id]();
    area.appendChild(div);
  });
}

function buildDots() {
  const dots = document.getElementById('dots');
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    dots.appendChild(d);
  });
  document.getElementById('counterTotal').textContent = slides.length;
}

function goTo(i) {
  document.querySelector('.slide.active')?.classList.remove('active');
  document.querySelector('.nav-btn.active')?.classList.remove('active');
  document.querySelectorAll('.dot')[current]?.classList.remove('active');
  current = i;
  document.getElementById('slide-' + slides[i].id).classList.add('active');
  document.querySelectorAll('.nav-btn')[i].classList.add('active');
  document.querySelectorAll('.dot')[i].classList.add('active');
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === slides.length - 1;
  document.getElementById('counterCurrent').textContent = i + 1;
}

function prevSlide() { if (current > 0) goTo(current - 1); }
function nextSlide() { if (current < slides.length - 1) goTo(current + 1); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') prevSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nextSlide();
});

function openChapterModal(chapterNum) {
  const data = chaptersData[chapterNum];
  if (!data) return;
  document.getElementById('modalChapterNum').textContent = 'פרק ' + chapterNum;
  document.getElementById('modalTitle').textContent = data.title;
  document.getElementById('modalSubtitle').textContent = data.subtitle;
  const body = document.getElementById('modalBody');
  body.innerHTML = data.sections.map(([num, title, desc]) => `
    <div class="modal-section">
      <div class="modal-section-icon">${ic('book', 18)}</div>
      <div class="modal-section-content">
        <div class="modal-section-title">${num} ${title}</div>
        <div class="modal-section-desc">${desc}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('chapterModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeChapterModal() {
  document.getElementById('chapterModal').classList.remove('active');
  document.body.style.overflow = '';
}

function openToolModal(toolName) {
  const data = toolsData[toolName];
  if (!data) return;
  const modal = document.getElementById('chapterModal');
  const header = modal.querySelector('.modal-header');
  
  // Update header with tool-specific color
  header.style.background = `linear-gradient(135deg, ${data.color} 0%, ${shadeColor(data.color, -20)} 100%)`;
  
  document.getElementById('modalChapterNum').textContent = 'כלי דיגיטלי';
  document.getElementById('modalTitle').textContent = data.title;
  document.getElementById('modalSubtitle').textContent = data.subtitle;
  
  const body = document.getElementById('modalBody');
  let html = '';
  
  // Description
  if (data.description) {
    html += `<div class="modal-description">${data.description}</div>`;
  }
  
  // Live demo button (if tool has a live link)
  if (data.liveLink) {
    html += `

  }
  
  // Features
  if (data.features && data.features.length) {

      <div class="modal-note">

}

function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  const amt = Math.round(2.55 * percent);
  const R = (num >> 16) + amt;
  const G = (num >> 8 & 0x00FF) + amt;
  const B = (num & 0x0000FF) + amt;
  return '#' + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function openSiteModal() {
  const modal = document.getElementById('siteModal');
  const iframe = document.getElementById('siteIframe');
  const loader = document.getElementById('siteLoader');
  
  // Reset loader visible
  loader.classList.remove('hidden');
  
  // Load iframe only when opened (lazy)
  if (!iframe.src) {
    iframe.src = 'https://elder-aid-station.lovable.app';
    iframe.onload = () => {
      setTimeout(() => loader.classList.add('hidden'), 400);
    };
    // Fallback: hide loader after 5s regardless
    setTimeout(() => loader.classList.add('hidden'), 5000);
  } else {
    // Already loaded
    setTimeout(() => loader.classList.add('hidden'), 200);
  }
  
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeSiteModal() {
  document.getElementById('siteModal').classList.remove('active');
  document.body.style.overflow = '';
}

function openToolDemo(url, title) {
  // Close the tool modal first
  closeChapterModal();
  
  // Reuse the site modal UI for the tool demo
  const modal = document.getElementById('siteModal');
  const iframe = document.getElementById('siteIframe');
  const loader = document.getElementById('siteLoader');
  const body = modal.querySelector('.site-modal-body');
  const titleEl = modal.querySelector('.site-modal-title');
  const urlEl = modal.querySelector('.site-modal-url');
  const openBtn = modal.querySelector('.site-modal-actions a');
  const loaderText = modal.querySelector('.site-loader-text');
  
  // Update header
  if (titleEl) titleEl.textContent = title + ' — הדגמה חיה';
  if (urlEl) {
    try {
      urlEl.textContent = new URL(url).hostname + new URL(url).pathname;
    } catch (e) {
      urlEl.textContent = url;
    }
  }
  if (openBtn) openBtn.href = url;
  if (loaderText) loaderText.textContent = 'טוען את הכלי...';
  
  // Remove any previous fallback overlay
  const prevFallback = body.querySelector('.site-iframe-fallback');
  if (prevFallback) prevFallback.remove();
  
  loader.classList.remove('hidden');
  
  // Open modal first so dimensions are set
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  
  // Set iframe src directly (no reset hack — direct assignment)
  iframe.src = url;
  
  let loaded = false;
  iframe.onload = () => {
    loaded = true;
    setTimeout(() => loader.classList.add('hidden'), 300);
    // Verify content actually rendered (iframe onload fires even for blocked content)
    setTimeout(() => verifyIframeContent(body, url, title), 800);
  };
  
  // Fallback if onload never fires within 6s
  setTimeout(() => {
    if (!loaded) {
      loader.classList.add('hidden');
      verifyIframeContent(body, url, title);
    }
  }, 6000);
}

function verifyIframeContent(body, url, title) {
  const iframe = document.getElementById('siteIframe');
  let hasContent = false;
  try {
    const doc = iframe.contentDocument;
    if (doc && doc.body && (doc.body.children.length > 0 || doc.body.innerHTML.length > 100)) {
      hasContent = true;
    }
  } catch (e) {
    // Cross-origin error = browser security blocks inspection, but content is typically rendering fine
    hasContent = true;
  }
  
  if (hasContent) {
    // Content is fine, remove any existing fallback
    const existing = body.querySelector('.site-iframe-fallback');
    if (existing) existing.remove();
    return;
  }
  
  // iframe appears empty - show fallback overlay with direct-open button
  // Remove any existing fallback first
  const existing = body.querySelector('.site-iframe-fallback');
  if (existing) existing.remove();
  
  const fallback = document.createElement('div');
  fallback.className = 'site-iframe-fallback';
  fallback.style.cssText = 'position:absolute; inset:0; background:#f8fafc; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px; text-align:center; z-index:3;';
  fallback.innerHTML = `
    <div style="width:72px; height:72px; border-radius:50%; background:rgba(212,175,55,0.15); display:flex; align-items:center; justify-content:center; color:#d4af37;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div>
      <div style="font-family:'Heebo',sans-serif; font-size:22px; font-weight:800; color:#125c6d; margin-bottom:10px;">הכלי לא ניתן להצגה בחלון מוטמע</div>
      <div style="font-size:14px; color:#64748b; line-height:1.7; max-width:480px;">הכלי הזה לא מאפשר הטמעה בפריים (iframe) מטעמי אבטחה או הגדרות CORS. לחצו על הכפתור למטה כדי לפתוח אותו בחלון חדש ולהדגים אותו מול המשקיעים.</div>
    </div>
    <a href="${url}" target="_blank" rel="noopener" style="background:linear-gradient(135deg,#125c6d 0%,#0d4452 100%); color:white; border:none; padding:14px 32px; border-radius:99px; font-family:'Heebo',sans-serif; font-size:15px; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:10px; text-decoration:none; box-shadow:0 8px 24px rgba(18,92,109,0.3); transition:transform 0.2s;" onmouseenter="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      פתחו את הכלי בחלון חדש
    </a>
    <div style="font-size:12px; color:#94a3b8; margin-top:8px; direction:ltr;">${url}</div>
  `;
  body.appendChild(fallback);
}
